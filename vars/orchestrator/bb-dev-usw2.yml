bastion:
  login_user: ubuntu
  ssh_key_name: bastion

bonusbits:
  ami_save_count: 2
  web_backup: true # For Testing

orchestrator:
  environment: bonusbits
  feature_toggles:
    debug: false
    skip_all_prompts: false
    use_secrets_manager: true

secrets:
  secrets_manager:
    name: bb-dev-usw2-devops

terraform:
  roles:
    - network
    - cloudwatch_logs
    - bastion
    - eks_cluster
    - eks_compute
    - eks_ingress_controller
    - eks_apps
  tfvar_roles_path: vars/terraform/bb-dev-usw2
  shared_tfvar_files:
    - vars/secrets/bb-shared/access_lists.tfvars
  s3_backend:
    bucket: bonusbits-tfs
    region: us-west-2
    key_prefix: workspaces
