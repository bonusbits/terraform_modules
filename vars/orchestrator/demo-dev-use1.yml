bastion:
  login_user: ubuntu
  ssh_key_name: bastion

orchestrator:
  environment: demo
  feature_toggles:
    debug: false
    skip_all_prompts: false
    use_secrets_manager: true

secrets:
  secrets_manager:
    name: demo-dev-use1-devops

terraform:
  roles:
    - network
    - cloudwatch_logs
    - bastion
    - eks_cluster
    - eks_compute
    - eks_ingress_controller
    - eks_apps
  tfvar_roles_path: vars/terraform/demo-dev-use1
  shared_tfvar_files:
    - vars/secrets/demo-dev-use1/access_lists.tfvars
  s3_backend:
    bucket: demo-tfs
    region: us-east-1
    key_prefix: workspaces
