---
AWSTemplateFormatVersion: 2010-09-09
Description: Create S3 Bucket for Terraform State Files

Parameters:
  # Ownership
  Owner:
    Type: String
    Default: first.last@domain.com
  Project:
    Type: String
    Default: Terraform Backend Storage
  DeleteAfter:
    Type: String
    Default: 00/00/202x

  # Deployment
  BucketName:
    Type: String
    Default: bonusbits-tfstate
  IamUserList:
    Type: List<String>
    Default: "arn:aws:iam::<************>:user/<username>,arn:aws:iam::<************>:user/<username>"
  PreviousLifeCycle:
    Type: Number
    Default: 30

Resources:
  Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      AccessControl: Private
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: !Join [ "", [ "Delete Previous > ", !Ref PreviousLifeCycle, " Days" ] ]
            NoncurrentVersionExpirationInDays: !Ref PreviousLifeCycle
            Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Owner
          Value: !Ref Owner
        - Key: Project
          Value: !Ref Project
        - Key: DeleteAfter
          Value: !Ref DeleteAfter

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref Bucket
      PolicyDocument:
        Version: '2008-10-17'
        Statement:
          -
            Sid: "Deny Unencrypted Put Object"
            Effect: Deny
            Principal: "*"
            Action:
              - "s3:PutObject"
            Resource: !Join [ "", [ "arn:aws:s3:::", !Ref Bucket, "/*" ] ]
            Condition:
              StringNotEquals:
                s3:x-amz-server-side-encryption: "AES256"
          -
            Sid: "Deny Unencrypted Object Uploads"
            Effect: Deny
            Principal: "*"
            Action:
              - "s3:PutObject"
            Resource: !Join [ "", [ "arn:aws:s3:::", !Ref Bucket, "/*" ] ]
            Condition:
              "Null":
                s3:x-amz-server-side-encryption: "true"
          -
            Sid: "Allow IAM Users Read-Write Content"
            Effect: Allow
            Principal:
              AWS: !Ref IamUserList
            Action: "*"
            Resource:
              - !Join [ "", [ "arn:aws:s3:::", !Ref Bucket ] ]
              - !Join [ "", [ "arn:aws:s3:::", !Ref Bucket, "/*" ] ]
              - !Join [ "", [ "arn:aws:s3:::", !Ref Bucket, "/workspaces/*" ] ]

Outputs:
  BucketName:
    Description: S3 Bucket Name
    Value: !Ref BucketName
  PreviousLifeCycle:
    Description: Previous Life Cycle
    Value: !Ref PreviousLifeCycle

Metadata:
  TemplateAuthor: 'levon.becker.github@bonusbits.com'
  AWS::CloudFormation::Interface:
    ParameterGroups:
      -
        Label:
          default: Ownership
        Parameters:
          - Owner
          - Project
          - DeleteAfter
      -
        Label:
          default: Deployment
        Parameters:
          - BucketName
          - IamUserList
          - PreviousLifeCycle

    ParameterLabels:
      # Ownership
      Owner:
        default: Owner
      Project:
        default: Project
      DeleteAfter:
        default: Delete After

      # Deployment
      BucketName:
        default: Bucket Name
      IamUserList:
        default: Iam User List (ARN)
      PreviousLifeCycle:
        default: Previous LifeCycle (Days)
